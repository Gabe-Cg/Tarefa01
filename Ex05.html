<!DOCTYPE html>

<body>

    <!--Faça uma função anônima com ES6, armazenada na variável mostrarFrase, que receba os parâmetros 
    "nome" e "sobrenome" e imprima a seguinte mensagem no browser: Olá . Exemplo: Eu sou Fulano de Tal.-->

    <script>

        mostraFrase = function (nome, sobrenome) {
            return "Olá, Eu sou " + nome + " " + sobrenome;
        }

        document.write(mostraFrase("Gabriely", "Colombo"));
        
    </script>

</body>
