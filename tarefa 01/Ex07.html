<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 07</title>
</head>
<body>

    <!--Faça uma função anônima com ES6, armazenada na variável descobrirDiametro, que receba o parâmetro "raio"
    e imprima a seguinte mensagem no browser: O diâmetro é: .-->

    <script>
        descobrirDiametro = function(raio){

            return "O diâmetro é: " + 2 * raio;
        }

        document.write(descobrirDiametro(20));

    </script>

</body>
</html>
